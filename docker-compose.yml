services:
  app:
    image: ghcr.io/bankpanupong43/investment-os:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /data/brain-os:/data/brain-os
    env_file:
      - .env.production
    environment:
      - PRISMA_QUERY_ENGINE_LIBRARY=/app/node_modules/.prisma/client/libquery_engine-linux-musl-openssl-3.0.x.so.node
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --protocol http2 run
    env_file:
      - .env.production
    depends_on:
      - app

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    environment:
      # containrrr/watchtower is unmaintained and its vendored Docker client
      # negotiates API 1.25 by default, which newer Docker Engine releases
      # reject outright. Pin a version the daemon actually supports so the
      # client skips negotiation instead of crash-looping.
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Reuse the host's existing GHCR credentials so Watchtower's own
      # registry pull/HEAD requests are authenticated (it does not inherit
      # the host docker CLI's config automatically).
      - /root/.docker/config.json:/config.json:ro
    command: --interval 120 --cleanup investment-os-app-1
